  :root {
    --bg: #F7F4F0;
    --card: #FFFFFF;
    --aubergine: #4A2545;
    --plum: #7B3F6E;
    --gold: #C4964A;
    --gold-light: #F0E0C0;
    --cream: #FBF8F4;
    --text: #1E1018;
    --muted: #8A7880;
    --border: #EAE2E8;
    --green: #4A7C59;
    --red: #9B3A3A;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;

  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; }

  .header {

    padding: 16px 20px 14px;
    position: sticky; top: 0; z-index: 100;

  .header-inner {

    display: flex; align-items: center; justify-content: space-between;

  .header h1 { font-size: 18px; font-weight: 800; color: #fff; }

  .header-badge {

    padding: 4px 12px; font-size: 12px; color: #fff; font-weight: 600;
  }

  /* CONTENT */
  .content { max-width: 480px; margin: 0 auto; padding: 16px 16px 20px; }

  /* BOTTOM NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; padding: 10px 4px 14px; background: none; border: none;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted); transition: color 0.15s; font-size: 10px; font-weight: 500;
  }
  .nav-btn.active { color: var(--aubergine); font-weight: 800; }
  .nav-btn span.icon { font-size: 20px; }
  .nav-dot {
    width: 4px; height: 4px; border-radius: 2px;
    background: var(--aubergine); margin-top: 1px;
  }

  /* CARDS */
  .card {
    background: var(--card); border-radius: 18px;
    border: 1px solid var(--border); padding: 20px; margin-bottom: 14px;
  }
  .card-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 12px; }

  /* BUTTONS */

    width: 100%; padding: 15px; background: var(--aubergine);

    font-weight: 800; font-size: 15px; transition: opacity 0.2s;

  .btn-primary:active { opacity: 0.85; }
  .btn-secondary {
    padding: 10px 16px; background: transparent;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    transition: all 0.15s;
  }

  /* CHAT */

    display: flex; flex-direction: column;
    height: calc(100vh - 160px);
  }
  .chat-messages { flex: 1; overflow-y: auto; padding-bottom: 12px; }
  .msg {
    margin-bottom: 12px;
    display: flex;
  }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 82%; padding: 12px 16px;
    font-size: 14px; line-height: 1.65; white-space: pre-wrap;
  }
  .bubble.user {
    background: var(--aubergine); color: #fff;
    border-radius: 18px 18px 4px 18px;
  }
  .bubble.assistant {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
  }
  .chat-input-row {

    border-top: 1px solid var(--border); background: var(--bg);

  .chat-input {
    flex: 1; padding: 12px 16px; border-radius: 24px;
    border: 1.5px solid var(--border); font-size: 14px;
    outline: none; background: var(--card); color: var(--text);

    color: #fff; font-size: 18px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.2s;
  }
  .chat-send:disabled { background: var(--border); }

  .typing-dots { display: flex; gap: 4px; padding: 12px 16px; }
  .dot {
    width: 8px; height: 8px; border-radius: 4px;
    background: var(--muted); animation: bounce 1s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

    border: 1.5px solid var(--border); border-radius: 14px;
    text-align: left; font-size: 14px; color: var(--text);

    background: var(--green); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 14px; font-weight: 700;

  .section-label {
    font-size: 12px; color: var(--muted); font-weight: 700;

  .page-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 16px; }
  .tip-box {

  .recipe-box {
    background: var(--cream); border-radius: 12px;
    padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6;
  }
</style>
</head>

    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'Beklager, prøv igjen.';
    chatMessages.push({ role: 'assistant', content: reply });
    await saveChatMessage('assistant', reply);
  } catch {
    chatMessages.push({ role: 'assistant', content: 'Noe gikk galt. Sjekk tilkoblingen.' });
  }
  chatLoading = false;
  renderChat();
}

// ── TOAST ───────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── RENDER HELPERS ──────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style') el.style.cssText = v;
    else if (k.startsWith('on')) el[k.toLowerCase()] = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function div(cls, ...children) { return h('div', { className: cls }, ...children); }
function span(cls, text) { return h('span', { className: cls }, text); }

// ── RENDER CHAT ─────────────────────────────────────────────────
function renderChat() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const wrap = div('chat-wrap');

  const msgs = div('chat-messages');

  if (chatMessages.length === 0) {
    const intro = div('');
    const bubble = div('');
    bubble.style.cssText = 'background:#4A2545;border-radius:18px;padding:20px;margin-bottom:20px;';
    bubble.innerHTML = `<div style="font-size:15px;color:#fff;font-weight:700;margin-bottom:6px">Hei Erika! Jeg er din personlige coach 💪</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.85);line-height:1.6">Jeg kjenner målene dine, treningsprogrammet ditt og skadene dine. Spør meg om hva som helst — trening, mat, motivasjon!</div>`;
    intro.appendChild(bubble);

    const suglbl = div('section-label');
    suglbl.textContent = 'Forslag';
    intro.appendChild(suglbl);

    ['Hva bør jeg spise etter trening?', 'Gi meg tips for dag 1 på gym', 'Jeg har lite energi i dag', 'Hva er riktig teknikk for hip thrust?', 'Lag meg en enkel middagsplan for uken'].forEach(s => {
      const btn = h('button', { className: 'suggestion', onclick: () => sendMessage(s) }, s);
      intro.appendChild(btn);
    });
    msgs.appendChild(intro);
  }

  chatMessages.forEach(m => {
    const row = div(`msg ${m.role}`);
    const b = div(`bubble ${m.role}`);
    b.textContent = m.content;
    row.appendChild(b);
    msgs.appendChild(row);
  });

  if (chatLoading) {
    const row = div('msg assistant');
    const b = div('bubble assistant');
    b.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    row.appendChild(b); msgs.appendChild(row);
  }

  wrap.appendChild(msgs);

  const inputRow = div('chat-input-row');
  const inp = h('input', { className: 'chat-input', placeholder: 'Spør coachen...', type: 'text' });
  const sendBtn = h('button', { className: 'chat-send', onclick: () => { if (inp.value.trim()) { sendMessage(inp.value.trim()); inp.value = ''; } } }, '→');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); } });
  inputRow.appendChild(inp); inputRow.appendChild(sendBtn);
  wrap.appendChild(inputRow);

  content.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── RENDER WORKOUT ───────────────────────────────────────────────
function renderWorkout() {
  const content = document.getElementById('content');

  const title = div('page-title'); title.textContent = 'Treningsprogram';
  content.appendChild(title);

  const grid = div('day-grid');
  PROGRAM.forEach((d, i) => {
    const btn = h('button', {
      className: `day-btn${activeDay === i ? ' active' : ''}`,
      style: activeDay === i ? `background:${d.color};border-color:${d.color};` : '',

    },
      h('div', { className: 'day-emoji' }, d.emoji),
      h('div', { className: 'day-name', style: activeDay === i ? 'color:#fff' : '' }, d.day),
      h('div', { className: 'day-focus', style: activeDay === i ? 'color:rgba(255,255,255,0.8)' : '' }, d.focus)
    );
    grid.appendChild(btn);
  });
  content.appendChild(grid);

  const prog = PROGRAM[activeDay];
  const header = div('');
  header.style.cssText = `background:${prog.color}18;border-radius:18px;padding:16px;margin-bottom:14px;border:1px solid ${prog.color}30`;
  header.innerHTML = `<div style="font-size:13px;font-weight:700;color:${prog.color}">${prog.emoji} ${prog.day}</div><div style="font-size:18px;font-weight:800;color:#1E1018;margin-top:2px">${prog.focus}</div>`;
  content.appendChild(header);

  if (prog.note) {
    const warn = div('warning-box'); warn.textContent = '⚠️ ' + prog.note;
    content.appendChild(warn);
  }

  prog.exercises.forEach((ex, i) => {
    const key = `${activeDay}-${i}`;
    const card = div('exercise-card');

    const hdr = h('button', { className: 'exercise-header', onclick: () => { exerciseOpen[key] = !exerciseOpen[key]; renderWorkout(); } },
      h('div', { style: 'display:flex;align-items:center;gap:12px' },
        div('exercise-num', `${i+1}`),
        h('div', {},
          h('div', { className: 'exercise-name' }, ex.name),
          h('div', { className: 'exercise-meta' }, `${ex.sets} · ${ex.rest} pause`)
        )
      ),
      h('span', { style: `color:var(--muted);font-size:18px;transform:${exerciseOpen[key] ? 'rotate(180deg)' : 'none'};transition:transform 0.2s` }, '›')
    );
    card.appendChild(hdr);

    if (exerciseOpen[key]) {
      const tip = div('exercise-tip'); tip.textContent = '💡 ' + ex.tip;
      card.appendChild(tip);
    }
    content.appendChild(card);
  });

  const infoBox = div('card');
  infoBox.style.marginTop = '16px';
  infoBox.innerHTML = `<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:6px">💡 Ukesstruktur</div>
  <div style="font-size:13px;color:var(--muted);line-height:1.6">Anbefalt: Gym dag 1 + 2 med hviledag imellom. Hjemmedagene mellom eller etter. En full hviledag i uken.</div>`;
  content.appendChild(infoBox);
}

  content.appendChild(title);

  const tip = div('tip-box');
  tip.textContent = '🎯 Mål: 1550–1700 kcal/dag · Høy protein (128–144g) · Moderat karbo';

  MEALS.forEach((meal, mi) => {
    const card = div('card');

  content.appendChild(tips);
}

// ── RENDER CHECKIN ───────────────────────────────────────────────
function renderCheckin() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const today = new Date().toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long' });
  const lbl = div('section-label'); lbl.textContent = 'Dagens check-in';
  const title = div('page-title'); title.style.textTransform = 'capitalize'; title.textContent = today;
  content.appendChild(lbl); content.appendChild(title);

  // MOOD
  const moodCard = div('card');
  const moodTitle = div('card-title'); moodTitle.textContent = `Hvordan har dagen vært? ${'😔😐🙂😊🔥'[checkinState.mood-1]}`;
  moodCard.appendChild(moodTitle);
  const moodRow = div(''); moodRow.style.cssText = 'display:flex;justify-content:space-between';
  '😔😐🙂😊🔥'.split('').forEach((emoji, i) => {
    const btn = h('button', {
      className: `mood-btn${checkinState.mood === i+1 ? ' active' : ''}`,
      onclick: () => { checkinState.mood = i+1; renderCheckin(); }
    }, emoji);
    moodRow.appendChild(btn);
  });
  moodCard.appendChild(moodRow);
  content.appendChild(moodCard);

  // ENERGY
  const energyLabels = ['Veldig lav','Lav','Middels','God','Topp'];
  const energyCard = div('card');
  energyCard.innerHTML = `<div class="card-title">Energinivå: <span style="color:var(--aubergine)">${energyLabels[checkinState.energy-1]}</span></div>`;
  const range = h('input', { type: 'range', min: '1', max: '5', value: checkinState.energy, className: 'range-input', oninput: e => { checkinState.energy = +e.target.value; energyCard.querySelector('.card-title').innerHTML = `Energinivå: <span style="color:var(--aubergine)">${energyLabels[checkinState.energy-1]}</span>`; } });
  energyCard.appendChild(range);
  content.appendChild(energyCard);

  // TRAINED
  const trainedCard = div('card');
  const trainedTitle = div('card-title'); trainedTitle.textContent = 'Trente du i dag?';
  trainedCard.appendChild(trainedTitle);
  const trainedRow = div(''); trainedRow.style.cssText = 'display:flex;gap:10px';
  ['Ja 💪','Nei','Hviledag 😴'].forEach(t => {
    const btn = h('button', {
      className: `trained-btn${checkinState.trained === t ? ' active' : ''}`,
      onclick: () => { checkinState.trained = t; renderCheckin(); }
    }, t);
    trainedRow.appendChild(btn);
  });
  trainedCard.appendChild(trainedRow);
  content.appendChild(trainedCard);

  // WEIGHT
  const weightCard = div('card');
  weightCard.innerHTML = '<div class="card-title">Vekt (valgfritt)</div>';
  const weightRow = div(''); weightRow.style.cssText = 'display:flex;align-items:center;gap:10px';
  const weightInp = h('input', { type: 'number', step: '0.1', className: 'weight-input', placeholder: 'eks. 78.5', value: checkinState.weight, oninput: e => checkinState.weight = e.target.value });
  weightRow.appendChild(weightInp);
  weightRow.appendChild(h('span', { style: 'color:var(--muted);font-weight:600' }, 'kg'));
  weightCard.appendChild(weightRow);
  content.appendChild(weightCard);

  // NOTE
  const noteCard = div('card');
  noteCard.innerHTML = '<div class="card-title">Notater</div>';
  const textarea = h('textarea', { className: 'checkin-note', placeholder: 'Hva gikk bra? Hva var vanskelig? Noe du vil huske...', oninput: e => checkinState.note = e.target.value });
  textarea.value = checkinState.note;
  noteCard.appendChild(textarea);
  content.appendChild(noteCard);

  // SAVE
  const saveBtn = h('button', {
    className: 'btn-primary',
    style: 'margin-bottom:28px',
    onclick: async () => {
      await saveCheckin({
        dato: new Date().toLocaleDateString('nb-NO'),
        humør: checkinState.mood,
        energi: checkinState.energy,
        trent: checkinState.trained,
        vekt: checkinState.weight ? parseFloat(checkinState.weight) : null,
        notat: checkinState.note
      });
      checkinState = { mood: 3, energy: 3, trained: null, note: '', weight: '' };
    }
  }, 'Lagre check-in');
  content.appendChild(saveBtn);

  // HISTORY
  if (checkLog.length > 0) {
    const histTitle = div(''); histTitle.style.cssText = 'font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px';
    histTitle.textContent = 'Siste check-ins';
    content.appendChild(histTitle);
    checkLog.slice(0,5).forEach(e => {
      const item = div('checkin-item');
      item.innerHTML = `<div><div style="font-size:13px;font-weight:700;color:var(--text)">${e.dato}</div>
        <div style="font-size:12px;color:var(--muted)">${e.trent || '—'} · Energi: ${e.energi}/5</div>
        ${e.notat ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${e.notat.slice(0,50)}${e.notat.length>50?'…':''}</div>` : ''}
      </div><div style="font-size:24px">${'😔😐🙂😊🔥'[e.humør-1]}</div>`;
      content.appendChild(item);
    });
  }
}

// ── RENDER PROGRESS ──────────────────────────────────────────────
function renderProgress() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const title = div('page-title'); title.textContent = 'Din progress';
  content.appendChild(title);

  const weightData = checkLog.filter(e => e.vekt).map(e => ({ dato: e.dato, v: e.vekt })).reverse();
  const moodAvg = checkLog.length ? (checkLog.reduce((s,e) => s+e.humør, 0)/checkLog.length).toFixed(1) : null;
  const trainedDays = checkLog.filter(e => e.trent?.startsWith('Ja')).length;
  const diff = weightData.length > 1 ? (weightData[weightData.length-1].v - weightData[0].v).toFixed(1) : null;

  const grid = div('stat-grid');
  [
    { lbl: 'Check-ins totalt', val: checkLog.length, suffix: 'dager', col: 'var(--aubergine)' },
    { lbl: 'Treningsdager', val: trainedDays, suffix: 'dager', col: 'var(--green)' },
    { lbl: 'Snitt humør', val: moodAvg || '–', suffix: '/5', col: 'var(--gold)' },
    { lbl: 'Vektendring', val: diff ? (diff > 0 ? `+${diff}` : diff) : '–', suffix: 'kg', col: diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--muted)' },
  ].forEach(s => {
    const card = div('stat-card');
    card.innerHTML = `<div class="stat-val" style="color:${s.col}">${s.val}<span class="stat-suffix">${s.suffix}</span></div><div class="stat-lbl">${s.lbl}</div>`;
    grid.appendChild(card);
  });
  content.appendChild(grid);

  if (weightData.length > 1) {
    const wCard = div('card');
    wCard.innerHTML = '<div class="card-title">Vektutvikling</div>';
    const chart = div('bar-chart');
    const slice = weightData.slice(-10);
    const maxW = Math.max(...slice.map(e=>e.v));
    const minW = Math.min(...slice.map(e=>e.v));
    slice.forEach(e => {
      const range = maxW - minW || 1;
      const bh = Math.max(8, ((e.v-minW)/range)*60+8);
      const col = div('bar-col');
      const bar = div('bar'); bar.style.cssText = `height:${bh}px;background:var(--aubergine)`;
      const lbl = div('bar-lbl'); lbl.textContent = e.v;
      col.appendChild(bar); col.appendChild(lbl);
      chart.appendChild(col);
    });
    wCard.appendChild(chart);
    content.appendChild(wCard);
  }

  if (checkLog.length === 0) {
    const empty = div(''); empty.style.cssText = 'text-align:center;padding:40px;color:var(--muted);font-size:14px';
    empty.textContent = 'Ingen data ennå. Start med en check-in!';
    content.appendChild(empty);
  }
}

// ── NAV ──────────────────────────────────────────────────────────
const TABS = [
  { id: 'chat', label: 'Coach', icon: '💬' },
  { id: 'workout', label: 'Trening', icon: '🏋️' },
  { id: 'food', label: 'Kosthold', icon: '🥗' },
  { id: 'checkin', label: 'Check-in', icon: '✅' },
  { id: 'progress', label: 'Progress', icon: '📈' },
];

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  TABS.forEach(t => {
    const btn = h('button', {
      className: `nav-btn${currentTab === t.id ? ' active' : ''}`,
      onclick: () => { currentTab = t.id; renderNav(); renderCurrentTab(); }
    },
      h('span', { className: 'icon' }, t.icon),
      t.label,
      currentTab === t.id ? div('nav-dot') : null
    );
    nav.appendChild(btn);
  });
}

function renderCurrentTab() {
  if (currentTab === 'chat') renderChat();
  else if (currentTab === 'workout') renderWorkout();
  else if (currentTab === 'food') renderFood();
  else if (currentTab === 'checkin') renderCheckin();
  else if (currentTab === 'progress') renderProgress();
}

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  renderNav();
  renderChat();
  await Promise.all([loadChatHistory(), loadCheckins()]);
  renderCurrentTab();
}

init();
</script>
